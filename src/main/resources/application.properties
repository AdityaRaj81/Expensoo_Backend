# PostgreSQL configuration
# Uses environment variable DATABASE_URL from Render or falls back to local
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/expensoo_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Admin1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate & JPA - Additional settings for cloud deployment
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.leak-detection-threshold=60000



# Server port (optional)
server.port=8080

# Flyway migration
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
