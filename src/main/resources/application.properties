# PostgreSQL configuration
# DATABASE_URL is automatically parsed by DatabaseConfig.java for Render deployment
# Local development uses these fallback values
spring.datasource.url=jdbc:postgresql://localhost:5432/expensoo_db
spring.datasource.username=postgres
spring.datasource.password=Admin1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Hibernate & JPA - Additional settings for cloud deployment
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.leak-detection-threshold=60000



# Server port (optional)
server.port=8080

# Flyway migration
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
